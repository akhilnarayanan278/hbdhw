<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>♡</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #ffe4ef 0%, #f9eef3 50%, #fff3f9 100%);
      display: flex;
      align-items: center;
      justify-content: center;  
      overflow: hidden;
      font-family: 'Lora', Georgia, serif;
    }

    .rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .drop {
      position: absolute;
      top: -5rem;
      animation: fall linear infinite;
      user-select: none;
      line-height: 1;
    }

    @keyframes fall {
      from { transform: translateY(0) rotate(0deg); }
      to   { transform: translateY(115vh) rotate(15deg); }
    }

    .drop svg { display: block; }

    /* Center card */
    .center {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1rem;
      max-width: 400px;
      width: 92vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 2rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 8px 32px rgba(220, 100, 140, 0.12);
      width: 430px;
    }

    .card p {
      font-size: 1.08rem;
      color: #5a2a3a;
      line-height: 2;
    }

    .card h5 {
      font-size: 1.3rem;
      color: #5a2a3a;
      line-height: 2;
    }


    .form-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 1.4rem 2rem;
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 8px 32px rgba(220, 100, 140, 0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }

    .buttons { display: flex; gap: 1rem; }

    .btn {
      width: 84px;
      padding: 0.55rem 0;
      border-radius: 50px;
      border: 1.5px solid #f0a8c0;
      background: rgba(255,255,255,0.7);
      color: #5a2a3a;
      font-family: 'Lora', Georgia, serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }

    .btn:hover    { background: #fce4ef; transform: translateY(-1px); }
    .btn.selected { background: #e8769a; color: #fff; border-color: #e8769a; }

    .send-btn {
      padding: 0.52rem 1.8rem;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #f0829e, #d45a7a);
      color: #fff;
      font-family: 'Lora', Georgia, serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 3px 12px rgba(212, 90, 122, 0.3);
    }

    .send-btn:hover    { opacity: 0.88; transform: translateY(-1px); }
    .send-btn:disabled { background: #ddd; box-shadow: none; cursor: default; transform: none; }

    .thankyou {
      font-size: 0.9rem;
      color: #b06080;
      font-style: italic;
      display: none;
    }
  </style>
</head>
<body>

  <div class="rain" id="rain"></div>

  <div class="center">
    <div class="card">
      <p>heather,<br>
      i really like you<br>
      you live rent-free in my head<br>
      so i made this page to ask you something :D <br>
      do you possibly like me back??<br> happy birthday btw </p>
    </div>

  <script>
    const rain = document.getElementById('rain');
    const HEARTS = ['♥','♡','💗','💕','💖'];

    // Round animal-style cell: wobbly membrane, nucleus + nucleolus, small organelle blobs
    function cellSVG(size, hue) {
      const r = size / 2;
      // wobbly outline
      const pts = 48;
      let d = '';
      for (let i = 0; i <= pts; i++) {
        const a = (i / pts) * Math.PI * 2;
        const noise = 1 + Math.sin(a * 3.7 + hue * 0.05) * 0.07;
        const x = r + Math.cos(a) * r * 0.88 * noise;
        const y = r + Math.sin(a) * r * 0.84 * noise;
        d += (i === 0 ? 'M' : 'L') + x.toFixed(2) + ',' + y.toFixed(2);
      }
      d += 'Z';

      const col  = `hsl(${hue},62%,70%)`;
      const colD = `hsl(${hue},52%,50%)`;

      // small organelle blobs
      const blobs = [
        { cx: r * 0.52, cy: r * 1.48, rx: r * 0.17, ry: r * 0.1,  rot: 25 },
        { cx: r * 1.52, cy: r * 0.58, rx: r * 0.15, ry: r * 0.09, rot: -15 },
        { cx: r * 1.48, cy: r * 1.42, rx: r * 0.14, ry: r * 0.09, rot: 45 },
      ];

      const nx = r * 1.08, ny = r * 0.92, nr = r * 0.27;

      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
        <path d="${d}" fill="${col}" fill-opacity="0.2" stroke="${col}" stroke-width="1.4" stroke-opacity="0.5"/>
        ${blobs.map(b => `<ellipse cx="${b.cx}" cy="${b.cy}" rx="${b.rx}" ry="${b.ry}" fill="${colD}" fill-opacity="0.35" transform="rotate(${b.rot},${b.cx},${b.cy})"/>`).join('')}
        <ellipse cx="${nx}" cy="${ny}" rx="${nr}" ry="${nr * 0.9}" fill="${col}" fill-opacity="0.5" stroke="${colD}" stroke-width="0.9" stroke-opacity="0.55"/>
        <circle  cx="${nx - nr*0.08}" cy="${ny - nr*0.08}" r="${nr * 0.38}" fill="${colD}" fill-opacity="0.6"/>
      </svg>`;
    }

    // Hues: soft pinks, lilacs, peaches, mints — all stay in the cute palette
    const HUES = [340, 355, 310, 280, 200, 170, 25, 45];

    for (let i = 0; i < 60; i++) {
      const el = document.createElement('span');
      el.className = 'drop';

      if (Math.random() < 0.45) {
        // cell
        const sz  = 26 + Math.random() * 28;
        const hue = HUES[Math.floor(Math.random() * HUES.length)];
        el.innerHTML = cellSVG(sz, hue);
      } else {
        // heart
        el.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
        el.style.fontSize = (0.8 + Math.random() * 1.3) + 'rem';
        el.style.color = `hsl(${330 + Math.random() * 30}, 75%, 68%)`;
        el.style.opacity = 0.5 + Math.random() * 0.5;
      }

      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (7 + Math.random() * 12) + 's';
      el.style.animationDelay    = -(Math.random() * 16) + 's';
      rain.appendChild(el);
    }

    // form
    let chosen = null;

    function pick(val) {
      chosen = val;
      document.getElementById('btnYes').classList.toggle('selected', val === 'yes');
      document.getElementById('btnNo').classList.toggle('selected',  val === 'no');
      document.getElementById('sendBtn').disabled = false;
    }

    function send() {
      if (!chosen) return;
      localStorage.setItem('answer', chosen);
      document.getElementById('sendBtn').style.display = 'none';
      document.getElementById('btnYes').disabled = true;
      document.getElementById('btnNo').disabled  = true;
      document.getElementById('thanks').style.display = 'block';
    }
  </script>
</body>
</html>
